<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>tinyux minimal example</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%20100%20100%27%3E%3Ctext%20y%3D%27.9em%27%20font-size%3D%2790%27%3E%F0%9F%A5%B7%3C%2Ftext%3E%3C%2Fsvg%3E">
  <link rel="stylesheet" href="./site.css">
</head>
<body>
  <header>
    <div class="container header-inner">
      <a class="brand" href="./index.html"><div class="logo"><span>TU</span></div><span class="brand-name">tinyux</span></a>
      <nav>
        <a class="nav-link" href="./docs.html">Docs</a>
        <a class="nav-link" href="./demo/product.html">Full demo</a>
      </nav>
    </div>
  </header>
  <main>
    <section class="hero">
      <div class="container hero-inner">
        <span class="eyebrow">minimal example</span>
        <h1>One button, one survey, one collector.</h1>
        <p class="lead">Open DevTools Network and click the button. Update `data-api-url` if you are not running the local demo server.</p>
        <div class="cta-row">
          <button class="btn btn-primary" data-product="premium" data-tinyux-trigger="click" data-tinyux-survey-id="post-cta">Upgrade to Premium</button>
          <button class="btn" id="ask-now">Ask survey now</button>
        </div>
      </div>
    </section>
  </main>

  <script
    src="./tinyux.js"
    data-app-id="example"
    data-api-url="/collect"
    data-config='{"debug":true,"surveys":{"maxPerSession":3,"minIntervalMinutes":0}}'></script>
  <script>
    const ux = window.tinyux.getInstance()
    ux.registerSurvey({
      id: 'post-cta',
      type: 'rating',
      title: 'Quick check',
      question: 'How helpful was the {{data-product}} message?',
      scale: 5,
      cooldownMinutes: 0
    })
    document.getElementById('ask-now').addEventListener('click', () => ux.showSurvey('post-cta'))
  </script>
</body>
</html>
